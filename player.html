
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Clone Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        .video-container { width: 100vw; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn {
            position: absolute; top: 20px; left: 20px; color: white;
            text-decoration: none; font-family: sans-serif; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 4px; z-index: 100;
            border: 1px solid white;
        }
        .back-btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/b9EkMc79ZSU?autoplay=1" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>

</body>
</html>
