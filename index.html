

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Clone</title>
    <style>
        body { margin: 0; background-color: #141414; color: white; font-family: Arial, sans-serif; }
        .nav { padding: 20px; background: rgba(0,0,0,0.5); position: fixed; width: 100%; top: 0; z-index: 10; }
        .logo { color: #e50914; font-size: 30px; font-weight: bold; }
        .hero { height: 80vh; background: linear-gradient(to top, #141414, transparent), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=1200') center/cover; display: flex; align-items: center; padding: 0 50px; }
        .hero-content { max-width: 500px; }
        .btn { padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        
        /* असली प्ले बटन यहाँ है */
        .btn-play { background-color: white; color: black; font-size: 18px; }
        .btn-play:hover { background-color: rgba(255,255,255,0.8); }

        .row { padding: 20px 50px; }
        .posters { display: flex; overflow-x: scroll; gap: 10px; padding: 20px 0; }
        .posters::-webkit-scrollbar { display: none; }
        .poster { height: 200px; border-radius: 4px; transition: transform 0.3s; }
        .poster:hover { transform: scale(1.1); cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">NET-CLONE</div>
    </div>

    <div class="hero">
        <div class="hero-content">
            <h1>Stranger Things</h1>
            <p>जब एक छोटा लड़का गायब हो जाता है, तो एक छोटा शहर गुप्त प्रयोगों और भयानक अलौकिक शक्तियों से जुड़े रहस्य को उजागर करता है।</p>
            
            <a href="player.html" class="btn btn-play">▶ Play Now</a>
        </div>
    </div>

    <div class="row">
        <h2>Trending Now</h2>
        <div class="posters">
            <img class="poster" src="https://via.placeholder.com/150x225/222/fff?text=Movie+1">
            <img class="poster" src="https://via.placeholder.com/150x225/333/fff?text=Movie+2">
            <img class="poster" src="https://via.placeholder.com/150x225/444/fff?text=Movie+3">
            <img class="poster" src="https://via.placeholder.com/150x225/555/fff?text=Movie+4">
            <img class="poster" src="https://via.placeholder.com/150x225/666/fff?text=Movie+5">
        </div>
    </div>

</body>
</html>
